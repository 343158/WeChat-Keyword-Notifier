name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      
    - name: Fix gradlew line endings
      run: |
        sed -i 's/\r$//' gradlew
        chmod +x gradlew
      
    - name: Debug info
      run: |
        echo "=== Current directory ==="
        ls -la
        echo "=== gradlew file ==="
        file gradlew
        head -3 gradlew
        echo "=== app/build.gradle exists? ==="
        ls -la app/build.gradle || echo "NOT FOUND"
      
    - name: Build debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace
      
    - name: Find APK files
      run: find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
      
    - name: Upload APK as artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
